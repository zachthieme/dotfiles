notes_dir: ~/CloudDocs/Notes

include:
  - "**/*.md"

exclude:
  - "templates/**"
  - "archive/**"
  - "CLAUDE.md"
  - "reviews/**"

refresh_interval: 5s

editor: hx

link_color: "#6CB4EE"

tag_colors:
  risk: "#FF6B6B"
  due: "#FF6B6B"
  today: green
  completed: green
  weekly: "#5B9BD5"
  monthly: "#7B68EE"
  quarterly: "#9370DB"
  horizon: "#FFD93D"
  talk: magenta
  _default: cyan

views:
  - title: "Priority"
    query: "open and (@weekly or @today)"
    sort: due_asc
    color: "#4EC9B0"
    order: 1


