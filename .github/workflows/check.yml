name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check formatting
        run: nix run .#formatter.x86_64-linux -- --check .

      - name: Flake check (schema + hermetic tests)
        run: nix flake check

      - name: Evaluate Linux configurations
        run: |
          for host in $(nix eval .#homeConfigurations --apply 'x: builtins.attrNames x' --json | jq -r '.[]'); do
            echo "Evaluating homeConfigurations.$host..."
            nix eval ".#homeConfigurations.$host.activationPackage.drvPath" > /dev/null
          done

  # Darwin configs can only be fully evaluated on macOS (catppuccin theming
  # uses import-from-derivation, which needs darwin builds). A failure here
  # is a real failure — do not mask it.
  check-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          # x86_64-darwin hosts (malv2) evaluate on the arm64 runner via Rosetta
          extra-conf: extra-platforms = x86_64-darwin
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Evaluate Darwin configurations
        run: |
          for host in $(nix eval .#darwinConfigurations --apply 'x: builtins.filter (n: n != "default") (builtins.attrNames x)' --json | jq -r '.[]'); do
            echo "Evaluating darwinConfigurations.$host..."
            nix eval ".#darwinConfigurations.$host.system.drvPath" > /dev/null
          done
