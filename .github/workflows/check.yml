name: Check

# Manual runs only — small daily commits to main shouldn't each burn CI
# minutes (especially the 10x-cost macOS runner). Trigger from the Actions
# tab or with: gh workflow run Check
on:
  workflow_dispatch:
  pull_request:

jobs:
  check-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Check formatting
        run: nix run .#formatter.x86_64-linux -- --check .

      - name: Flake check (schema + hermetic tests)
        run: nix flake check

      # Rubric ratchet: fails only on a NEW broken criterion (regression) or a
      # baselined one that started passing (stale) — see scripts/review.sh and
      # scripts/review-baseline.txt. The accepted backlog does not fail CI.
      - name: Rubric review (ratchet)
        run: ./scripts/review.sh

      - name: Evaluate Linux configurations
        run: |
          for host in $(nix eval .#homeConfigurations --apply 'x: builtins.attrNames x' --json | jq -r '.[]'); do
            echo "Evaluating homeConfigurations.$host..."
            nix eval ".#homeConfigurations.$host.activationPackage.drvPath" > /dev/null
          done

      # Evaluation alone misses build-time failures (dropped packages, bad
      # hashes, failing builders) — actually build one representative host
      - name: Build a Linux configuration (dev)
        run: nix build --no-link .#homeConfigurations.dev.activationPackage

  # Darwin configs can only be fully evaluated on macOS (catppuccin theming
  # uses import-from-derivation, which needs darwin builds). A failure here
  # is a real failure — do not mask it.
  check-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          # x86_64-darwin hosts (malv2) evaluate on the arm64 runner via Rosetta
          extra-conf: extra-platforms = x86_64-darwin

      - name: Evaluate Darwin configurations
        run: |
          for host in $(nix eval .#darwinConfigurations --apply 'x: builtins.attrNames x' --json | jq -r '.[]'); do
            echo "Evaluating darwinConfigurations.$host..."
            nix eval ".#darwinConfigurations.$host.system.drvPath" > /dev/null
          done

      # Same rationale as the Linux build step: catch build-time failures
      - name: Build a Darwin configuration (cortex)
        run: nix build --no-link .#darwinConfigurations.cortex.system
