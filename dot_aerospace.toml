after-login-command = []
# after-startup-command = ['exec-and-forget borders']

# Run Sketchybar together with AeroSpace
# sketchbar has a built-in detection of already running process,
# so it won't be run twice on AeroSpace restart
after-startup-command = ['exec-and-forget sketchybar', 'exec-and-forget borders']

# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

default-root-container-orientation = 'auto'

key-mapping.preset = 'qwerty'

on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-focus-changed = "move-mouse window-lazy-center"

[gaps]
inner.horizontal = 10
inner.vertical =   10
outer.left =       10
outer.bottom =     10
outer.top =        50
outer.right =      10

[mode.main.binding]

alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

alt-e = 'balance-sizes'
alt-f = 'layout floating tiling'
alt-m = 'fullscreen'
alt-r = 'reload-config'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = 'focus left --boundaries-action wrap-around-the-workspace'
alt-j = 'focus down --boundaries-action wrap-around-the-workspace'
alt-k = 'focus up --boundaries-action wrap-around-the-workspace'
alt-l = 'focus right --boundaries-action wrap-around-the-workspace'


ctrl-h = 'join-with left'
ctrl-j = 'join-with down'
ctrl-k = 'join-with up'
ctrl-l = 'join-with right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-shift-s = 'resize smart -50'
alt-shift-b = 'resize smart +50'

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-1 = 'workspace 1' # terminal
alt-2 = 'workspace 2' # Mail
alt-3 = 'workspace 3' # Slack/Messages
alt-4 = 'workspace 4' # Browser
alt-5 = 'workspace 5' # Teams
alt-6 = 'workspace 6' # Spotify
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-1 = ['move-node-to-workspace 1','workspace 1']
alt-shift-2 = ['move-node-to-workspace 2','workspace 2']
alt-shift-3 = ['move-node-to-workspace 3','workspace 3']
alt-shift-4 = ['move-node-to-workspace 4','workspace 4']
alt-shift-5 = ['move-node-to-workspace 5','workspace 5']
alt-shift-6 = ['move-node-to-workspace 6','workspace 6']
alt-shift-7 = ['move-node-to-workspace 7','workspace 7']
alt-shift-8 = ['move-node-to-workspace 8','workspace 8']
alt-shift-9 = ['move-node-to-workspace 9','workspace 9']

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = 'mode service'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
backspace = ['close-all-windows-but-current', 'mode main']


# Bind windows to workspaces
[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
run = "move-node-to-workspace 1"

[[on-window-detected]]
if.app-id = 'com.brave.Browser.app.faolnafnngnfdaknnbpnkhgohbobgegn'
run = "move-node-to-workspace 2"

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = "move-node-to-workspace 3"

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = 'com.apple.MobileSMS'
run = "move-node-to-workspace 4"

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = "move-node-to-workspace 5"

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = "layout floating"
